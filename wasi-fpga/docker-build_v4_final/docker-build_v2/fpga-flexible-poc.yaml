apiVersion: v1
kind: Pod
metadata:
  name: fpga-flexible-poc
spec:
  hostNetwork: true
  containers:
  - name: bcpnn-engine
    image: wasi-fpga:v2
    imagePullPolicy: Never
    securityContext:
      privileged: true
    workingDir: /app
    env:
      # --- CONFIGURATION PARAMETERS ---
      - name: RUN_MODE
        value: "video" # Change to "synthetic" for no-video mode
      - name: VIDEO_NAME
        value: "output.avi" # Video filename under /data/video_input/
      - name: XCLBIN_NAME
        value: "BCPNN_infer_float.xclbin"
      - name: WEIGHTS_NAME
        value: "alvis_fullmnist_32x128_64x64_eps-4.bin"
      # -----------------------------------
      - name: LD_LIBRARY_PATH
        value: "/lib:/usr/lib/aarch64-linux-gnu:/usr/local/lib"
      - name: WASMEDGE_PLUGIN_PATH
        value: "/opt/wasmedge/plugins/libwasi_fpga.so"
    
    command: ["/bin/bash", "-c"]
    args: 
      - |
        apt-get update && apt-get install -y ffmpeg
        
        # Build paths according to mode
        XCLBIN="/data/PAC_container/hwconfig/mnist_float/zcu104/$XCLBIN_NAME"
        WEIGHTS="/data/TrainedWeight/$WEIGHTS_NAME"
        VIDEO="/data/video_input/$VIDEO_NAME"

        if [ "$RUN_MODE" == "video" ]; then
          echo " Starting VIDEO MODE with: $VIDEO_NAME"
          /usr/local/bin/avi_processor "$VIDEO" "$XCLBIN" "$WEIGHTS"
        else
          echo " Starting SYNTHETIC MODE (No video)"
          /usr/local/bin/avi_processor --synthetic "$XCLBIN" "$WEIGHTS"
        fi

    volumeMounts:
    - mountPath: /dev
      name: dev-dir
    - mountPath: /data
      name: firmware-data
    - mountPath: /usr/local/bin/avi_processor
      name: rust-binary
    - mountPath: /app/wasm/test_bcpnn_infer_video.wasm
      name: wasm-module
    - mountPath: /opt/wasmedge/plugins/libwasi_fpga.so
      name: good-plugin
    - mountPath: /lib
      name: host-lib
    - mountPath: /usr/lib/aarch64-linux-gnu
      name: host-usr-lib-aarch
    - mountPath: /etc/OpenCL
      name: host-etc-opencl

  volumes:
  - name: dev-dir
    hostPath: {path: /dev}
  - name: firmware-data
    hostPath: {path: /home/ubuntu/bcpnn_artifacts}
  - name: rust-binary
    hostPath: {path: /home/ubuntu/wasi-fpga-artifact/wasi-fpga/avi_processor/target/release/avi_processor}
  - name: wasm-module
    hostPath: {path: /home/ubuntu/wasi-fpga-artifact/wasi-fpga/wasm/test_bcpnn_infer_video.wasm}
  - name: good-plugin
    hostPath: {path: /usr/local/lib/wasmedge/libwasi_fpga.so}
  - name: host-lib
    hostPath: {path: /lib}
  - name: host-usr-lib-aarch
    hostPath: {path: /usr/lib/aarch64-linux-gnu}
  - name: host-etc-opencl
    hostPath: {path: /etc/OpenCL}

  restartPolicy: Never
